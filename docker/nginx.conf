server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files with light caching
    location ~* \.(css|js|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Disable access logs for cleanliness (error log stays on)
    access_log off;
}
