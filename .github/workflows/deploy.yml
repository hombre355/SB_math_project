name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hombre355/sb_math_project
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in version.js
        run: |
          CURRENT=$(grep -o "'v[0-9]*\.[0-9]*'" js/version.js | tr -d "'")
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW="v1.$((MINOR + 1))"
          sed -i "s/$CURRENT/$NEW/" js/version.js
          echo "Bumped $CURRENT → $NEW"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/version.js
          git commit -m "chore: bump version [skip ci]" || echo "No changes to commit"
          git push

  build-and-push:
    runs-on: ubuntu-latest
    needs: bump-version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to UGreen NAS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 9020
          script: |
            mkdir -p ~/sb-math
            cd ~/sb-math
            docker compose pull
            docker compose up -d
            docker image prune -f

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      packages: write

    steps:
      - name: Delete old container versions (keep latest 2)
        uses: actions/delete-package-versions@v5
        with:
          package-name: sb_math_project
          package-type: container
          min-versions-to-keep: 2
